plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.miui.multiuserhook'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.miui.multiuserhook'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            debuggable true
        }

        release {
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
